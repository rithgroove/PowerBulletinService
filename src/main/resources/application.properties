spring.application.name=pb-service
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8083}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/power_bulletin}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration

tanuki.security.jwt-secret=${JWT_SECRET:change-this-development-secret-change-this}
tanuki.security.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3006,http://127.0.0.1:3006}

seed.power-bulletin.enabled=${SEED_POWER_BULLETIN_ENABLED:true}
